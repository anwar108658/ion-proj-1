<!-- Header with texture background -->
<ion-header class="ion-no-border">
  <div class="headerUI">
    <div class="header-top">
      <ion-button routerLink="/home" color="light" shape="round" class="close-btn">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
      <div class="header-title-container">
        <ion-text color="light">
          <h2>Add New Task</h2>
        </ion-text>
      </div>
    </div>
  </div>
</ion-header>
<ion-content [fullscreen]="true">
  <!-- Form Content Area -->
  <div class="ion-padding main-content">
    <ion-card class="form-card">
      <ion-card-content>
        
        <!-- Task Title Input -->
        <div class="input-group">
          <ion-label position="stacked" class="form-label">Task Title</ion-label>
          <ion-item lines="none" class="custom-input-item">
            <ion-input placeholder="Pick up Milk" value="Pick up Milk"></ion-input>
          </ion-item>
        </div>

        <!-- Category Selector -->
        <div class="input-group">
          <ion-label class="form-label">Category</ion-label>
          <div class="category-group">
            <ion-button fill="clear" class="cat-btn selected-blue">
              <ion-icon name="document-text-outline"></ion-icon>
            </ion-button>
            <ion-button fill="clear" class="cat-btn selected-purple">
              <ion-icon name="calendar-outline"></ion-icon>
            </ion-button>
            <ion-button fill="clear" class="cat-btn selected-yellow">
              <ion-icon name="trophy-outline"></ion-icon>
            </ion-button>
          </div>
        </div>

        <!-- When (Date & Time) Picker -->
        <div class="input-group">
          <ion-label class="form-label">When</ion-label>
          <div class="datetime-row">
            <!-- Date Picker Item -->
            <ion-item lines="none" class="custom-input-item datetime-item">
              <ion-datetime-button datetime="date-picker"></ion-datetime-button>
              <ion-modal [keepContentsMounted]="true">
                <ng-template>
                  <ion-datetime id="date-picker" presentation="date"></ion-datetime>
                </ng-template>
              </ion-modal>
              <ion-icon name="calendar-clear-outline" slot="end" class="input-icon"></ion-icon>
            </ion-item>

            <!-- Time Picker Item -->
            <ion-item lines="none" class="custom-input-item datetime-item">
              <ion-datetime-button datetime="time-picker"></ion-datetime-button>
              <ion-modal [keepContentsMounted]="true">
                <ng-template>
                  <ion-datetime id="time-picker" presentation="time"></ion-datetime>
                </ng-template>
              </ion-modal>
              <ion-icon name="time-outline" slot="end" class="input-icon"></ion-icon>
            </ion-item>
          </div>
        </div>

        <!-- Notes Textarea -->
        <div class="input-group">
          <ion-label position="stacked" class="form-label">Notes</ion-label>
          <ion-item lines="none" class="custom-input-item textarea-item">
            <ion-textarea placeholder="Add your notes here" rows="5"></ion-textarea>
          </ion-item>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>

<!-- Save Button Footer -->
<ion-footer class="ion-no-border ion-padding">
  <ion-button expand="block" class="footer-btn" shape="round" size="large">Save</ion-button>
</ion-footer>
