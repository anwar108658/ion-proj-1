<ion-content [fullscreen]="true">
  <ion-header class="ion-no-border">
    <div class="headerUI">
      <div class="hui1">
        <ion-button color="light" shape="round">
          <ion-icon slot="icon-only" name="arrow-back"></ion-icon>
        </ion-button>
        <div>
          <ion-text color="light">october 20,2022</ion-text>
        </div>
      </div>
      <div class="hui2">
        <ion-text color="light">
          <h1>My Todo List</h1>
        </ion-text>
      </div>
    </div>
  </ion-header> 

  <div class="ion-padding main-content">

            <ion-thumbnail slot="start">

            <ion-label>Item</ion-label>
          </ion-item>

            <ion-label>Item</ion-label>
          </ion-item>
  
          <ion-item lines="none">

              <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/thumbnail.svg" />
            </ion-thumbnail>

        </ion-list>
      </ion-card-content>

    <ion-text class="ion-padding">

            </ion-thumbnail>
            <ion-label>Item</ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
<ion-footer class="ion-no-border ion-padding">
  <ion-button expand="block" class="footer-btn" shape="round" size="large">Add New Task</ion-button>
</ion-footer>
